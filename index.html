<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Tracker</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top">
        <div>
          <h1>Budget Tracker</h1>
          <p class="subtitle">Track your income and expenses</p>
        </div>
        <div class="header-actions">
          <span class="user-email" id="user-email" hidden></span>
          <a class="btn-secondary" id="auth-link" href="login.html">Login / Sign Up</a>
          <button class="btn-secondary" id="logout-btn" type="button" hidden>Logout</button>
        </div>
      </div>
    </header>

    <p class="page-message" id="page-message" aria-live="polite"></p>

    <!-- Summary Cards -->
    <section class="summary">
      <div class="card balance">
        <span class="card-label">Balance</span>
        <span class="card-amount" id="balance">$0.00</span>
      </div>
      <div class="card income">
        <span class="card-label">Total Income</span>
        <span class="card-amount" id="total-income">$0.00</span>
      </div>
      <div class="card expense">
        <span class="card-label">Total Expenses</span>
        <span class="card-amount" id="total-expense">$0.00</span>
      </div>
    </section>

    <!-- Add Transaction Form -->
    <section class="form-section">
      <h2>Add Transaction</h2>
      <form id="transaction-form">
        <div class="form-row">
          <div class="form-group">
            <label for="description">Description</label>
            <input type="text" id="description" placeholder="e.g. Rent, Salary..." required />
          </div>
          <div class="form-group">
            <label for="amount">Amount ($)</label>
            <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required />
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category">
              <option value="General">General</option>
              <option value="Food">Food</option>
              <option value="Housing">Housing</option>
              <option value="Transport">Transport</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Healthcare">Healthcare</option>
              <option value="Salary">Salary</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="type">Type</label>
            <select id="type">
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn-add">+ Add Transaction</button>
      </form>
    </section>

    <!-- Transaction History -->
    <section class="history-section">
      <div class="history-header">
        <h2>Transaction History</h2>
        <button class="btn-clear" id="clear-btn">Clear All</button>
      </div>
      <ul id="transaction-list">
        <li class="empty-state">No transactions yet. Add one above!</li>
      </ul>
    </section>
  </div>

  <script src="assets/js/cache-registration.js"></script>
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
